# rooteros - Synology Container Manager / docker compose deployment.
# See deploy/DEPLOY-SYNOLOGY.md for full instructions.
services:
  rooteros:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: rooteros:latest
    container_name: rooteros
    restart: unless-stopped
    ports:
      - "7070:7070"          # host:container - change the LEFT side if 7070 is taken on the NAS
    environment:
      # REQUIRED: set this to how players actually reach the server.
      #   LAN only:        http://<NAS-LAN-IP>:7070     (e.g. http://192.168.1.50:7070)
      #   Domain + HTTPS:  https://games.example.com    (behind the DSM reverse proxy)
      PUBLIC_URL: "http://192.168.1.50:7070"
      PORT: "7070"
    volumes:
      - rooteros-db:/data    # HSQLDB database - persists games & accounts across restarts

volumes:
  rooteros-db:
